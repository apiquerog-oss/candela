<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Candela">
<title>Candela — Tu asistente de agenda</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; min-height: 100vh; }

  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: #fff; }
  .screen { display: none; flex-direction: column; min-height: 100vh; }
  .screen.active { display: flex; }

  /* CONFIG */
  .config-wrap { flex: 1; padding: 40px 24px 32px; display: flex; flex-direction: column; }
  .config-logo { text-align: center; margin-bottom: 32px; }
  .big-avatar { width: 80px; height: 80px; border-radius: 50%; background: #ede9fe; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 16px; }
  .config-logo h1 { font-size: 24px; font-weight: 600; color: #1a1a1a; }
  .config-logo p { font-size: 14px; color: #666; margin-top: 6px; line-height: 1.5; }

  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .field input { width: 100%; border: 1.5px solid #e5e5e5; border-radius: 12px; padding: 14px 16px; font-size: 15px; background: #fafafa; color: #1a1a1a; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: #7c3aed; background: #fff; }
  .field .hint { font-size: 11px; color: #aaa; margin-top: 6px; }

  .btn-primary { width: 100%; padding: 16px; background: #7c3aed; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
  .btn-primary:hover, .btn-primary:active { background: #6d28d9; }
  .btn-primary:disabled { opacity: 0.5; }
  .error-msg { color: #dc2626; font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }

  /* HEADER */
  .header { padding: 16px 20px 12px; border-bottom: 1px solid #f0f0f0; background: #fff; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: #ede9fe; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header h1 { font-size: 17px; font-weight: 600; color: #1a1a1a; }
  .status { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #16a34a; margin-top: 2px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #16a34a; }
  .btn-logout { background: none; border: none; font-size: 13px; color: #aaa; cursor: pointer; padding: 4px 8px; }

  /* QUICK CHIPS */
  .quick-actions { padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid #f0f0f0; }
  .quick-actions::-webkit-scrollbar { display: none; }
  .chip { background: #f5f3ff; border: 1px solid #ddd6fe; border-radius: 20px; padding: 7px 14px; font-size: 13px; color: #7c3aed; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; }
  .chip:active { background: #ede9fe; }

  /* CHAT */
  .chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 100px; }
  .msg { max-width: 82%; padding: 11px 15px; border-radius: 18px; font-size: 15px; line-height: 1.55; word-break: break-word; }
  .msg.candela { background: #f5f3ff; color: #1a1a1a; border-radius: 18px 18px 18px 4px; align-self: flex-start; }
  .msg.user { background: #7c3aed; color: #fff; border-radius: 18px 18px 4px 18px; align-self: flex-end; }
  .msg.system { background: #f9f9f9; border: 1px solid #eee; border-radius: 10px; align-self: center; font-size: 12px; color: #888; padding: 6px 12px; max-width: 90%; text-align: center; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 12px 15px; background: #f5f3ff; border-radius: 18px 18px 18px 4px; align-self: flex-start; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: #a78bfa; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)} }

  /* INPUT */
  .input-area { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; padding: 10px 14px 20px; background: #fff; border-top: 1px solid #f0f0f0; display: flex; gap: 8px; align-items: flex-end; }
  .input-area textarea { flex: 1; border: 1.5px solid #e5e5e5; border-radius: 22px; padding: 11px 16px; font-size: 15px; font-family: inherit; resize: none; min-height: 44px; max-height: 110px; background: #fafafa; color: #1a1a1a; outline: none; line-height: 1.4; transition: border-color 0.2s; }
  .input-area textarea:focus { border-color: #7c3aed; background: #fff; }
  .btn-mic { width: 44px; height: 44px; border-radius: 50%; background: #7c3aed; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .btn-mic:active { background: #6d28d9; transform: scale(0.95); }
  .btn-mic.recording { background: #dc2626; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.08)} }
  .btn-send { width: 44px; height: 44px; border-radius: 50%; background: #7c3aed; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .btn-send:active { background: #6d28d9; transform: scale(0.95); }
</style>
</head>
<body>
<div id="app">

  <!-- PANTALLA CONFIG -->
  <div id="config-screen" class="screen active">
    <div class="config-wrap">
      <div class="config-logo">
        <div class="big-avatar">🕯️</div>
        <h1>Hola, soy Candela</h1>
        <p>Tu asistente personal de agenda.<br>Introduce tus credenciales para empezar.</p>
      </div>
      <div class="field">
        <label>Anthropic API Key</label>
        <input type="password" id="anthropic-key" placeholder="sk-ant-api03-..." autocomplete="off" />
        <div class="hint">Créala en console.anthropic.com → API Keys</div>
      </div>
      <div class="field">
        <label>Google Client ID</label>
        <input type="password" id="google-client-id" placeholder="xxxx.apps.googleusercontent.com" autocomplete="off" />
        <div class="hint">Google Cloud Console → Clientes → Asistente personal</div>
      </div>
      <div class="field">
        <label>Tu nombre</label>
        <input type="text" id="user-name" placeholder="¿Cómo te llamo?" autocomplete="off" />
      </div>
      <button class="btn-primary" id="btn-start" onclick="startApp()">Conectar con Google Calendar</button>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <!-- PANTALLA CHAT -->
  <div id="chat-screen" class="screen">
    <div class="header">
      <div class="header-top">
        <div class="header-left">
          <div class="avatar">🕯️</div>
          <div>
            <h1>Candela</h1>
            <div class="status"><div class="status-dot"></div> Conectada</div>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">Salir</button>
      </div>
    </div>
    <div class="quick-actions">
      <div class="chip" onclick="sendQuick('¿Qué tengo hoy?')">¿Qué tengo hoy?</div>
      <div class="chip" onclick="sendQuick('¿Tengo huecos libres mañana?')">Huecos mañana</div>
      <div class="chip" onclick="sendQuick('¿Qué tengo esta semana?')">Esta semana</div>
      <div class="chip" onclick="sendQuick('Quiero crear un evento nuevo')">Nuevo evento</div>
      <div class="chip" onclick="sendQuick('¿Cuándo tengo tiempo libre esta semana?')">Tiempo libre</div>
    </div>
    <div class="chat-area" id="chat-area"></div>
    <div class="input-area">
      <textarea id="msg-input" placeholder="Escribe o usa el micro..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-mic" id="btn-mic" onclick="toggleMic()" title="Hablar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>
      <button class="btn-send" onclick="sendMessage()" title="Enviar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
let ANTHROPIC_KEY = '';
let GOOGLE_CLIENT_ID = '';
let USER_NAME = '';
let tokenClient = null;
let accessToken = null;
let conversationHistory = [];
let recognition = null;
let isRecording = false;

function startApp() {
  ANTHROPIC_KEY = document.getElementById('anthropic-key').value.trim();
  GOOGLE_CLIENT_ID = document.getElementById('google-client-id').value.trim();
  USER_NAME = document.getElementById('user-name').value.trim() || 'jefe';

  if (!ANTHROPIC_KEY || !GOOGLE_CLIENT_ID) {
    showError('Por favor, rellena la API Key y el Client ID.');
    return;
  }

  const btn = document.getElementById('btn-start');
  btn.disabled = true;
  btn.textContent = 'Conectando...';
  showError('');
  loadGoogleAPIs();
}

function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
  const btn = document.getElementById('btn-start');
  btn.disabled = false;
  btn.textContent = 'Conectar con Google Calendar';
}

function loadGoogleAPIs() {
  const s1 = document.createElement('script');
  s1.src = 'https://apis.google.com/js/api.js';
  s1.onload = () => {
    gapi.load('client', async () => {
      try {
        await gapi.client.init({
          discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest']
        });
        loadGIS();
      } catch(e) {
        showError('Error iniciando la API de Google. Revisa el Client ID.');
      }
    });
  };
  s1.onerror = () => showError('No se pudo cargar la API de Google. Comprueba tu conexión.');
  document.head.appendChild(s1);
}

function loadGIS() {
  const s2 = document.createElement('script');
  s2.src = 'https://accounts.google.com/gsi/client';
  s2.onload = () => {
    try {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/calendar',
        callback: (resp) => {
          if (resp.error) {
            showError('Error de autorización: ' + resp.error);
            return;
          }
          accessToken = resp.access_token;
          gapi.client.setToken({ access_token: accessToken });
          enterChat();
        }
      });
      tokenClient.requestAccessToken({ prompt: 'consent' });
    } catch(e) {
      showError('Client ID incorrecto. Revísalo en Google Cloud Console.');
    }
  };
  s2.onerror = () => showError('Error cargando Google Sign-In.');
  document.head.appendChild(s2);
}

function enterChat() {
  document.getElementById('config-screen').classList.remove('active');
  document.getElementById('chat-screen').classList.add('active');
  addMsg('candela', `¡Hola, ${USER_NAME}! 🕯️ Soy Candela, ya estoy conectada a tu Google Calendar. Dime qué necesitas — puedo consultar tus eventos, buscar huecos libres y crear citas. ¡A tus órdenes!`);
}

function logout() {
  accessToken = null;
  conversationHistory = [];
  document.getElementById('chat-screen').classList.remove('active');
  document.getElementById('config-screen').classList.add('active');
  document.getElementById('chat-area').innerHTML = '';
}

function addMsg(type, content) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = content;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function addTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function getCalendarEvents() {
  try {
    const now = new Date();
    const weekLater = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
    const resp = await gapi.client.calendar.events.list({
      calendarId: 'primary',
      timeMin: now.toISOString(),
      timeMax: weekLater.toISOString(),
      maxResults: 30,
      singleEvents: true,
      orderBy: 'startTime'
    });
    return resp.result.items || [];
  } catch(e) { return []; }
}

async function createCalendarEvent(summary, start, end, description) {
  try {
    const resp = await gapi.client.calendar.events.insert({
      calendarId: 'primary',
      resource: {
        summary,
        description: description || '',
        start: { dateTime: start, timeZone: 'Europe/Madrid' },
        end: { dateTime: end, timeZone: 'Europe/Madrid' }
      }
    });
    return resp.result;
  } catch(e) { return null; }
}

function formatEventsForAI(events) {
  if (!events.length) return 'No hay eventos en los próximos 7 días.';
  return events.map(e => {
    const start = e.start.dateTime
      ? new Date(e.start.dateTime).toLocaleString('es-ES', {weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'})
      : e.start.date;
    const end = e.end.dateTime
      ? new Date(e.end.dateTime).toLocaleString('es-ES', {hour:'2-digit',minute:'2-digit'})
      : '';
    return `- ${e.summary || 'Sin título'}: ${start}${end ? ' hasta las ' + end : ''}`;
  }).join('\n');
}

async function callCandela(userMsg) {
  const events = await getCalendarEvents();
  const eventsText = formatEventsForAI(events);
  const today = new Date().toLocaleString('es-ES', {
    weekday:'long', day:'numeric', month:'long', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });

  const systemPrompt = `Eres Candela, una asistente personal de agenda simpática, cercana y en castellano de España. Tuteas al usuario, hablas con naturalidad y eres concisa. El usuario se llama ${USER_NAME}.

Hoy es: ${today} (zona horaria: Europe/Madrid)

Eventos del calendario para los próximos 7 días:
${eventsText}

IMPORTANTE: Si el usuario quiere CREAR un evento, responde ÚNICAMENTE con este JSON (sin texto extra):
{"action":"create_event","summary":"título","start":"2026-04-09T10:00:00","end":"2026-04-09T11:00:00","description":""}

Para el resto de consultas, responde de forma natural y conversacional. Cuando analices huecos libres, revisa los huecos entre eventos y dile claramente cuándo tiene tiempo libre. Sé útil y cercana.`;

  conversationHistory.push({ role: 'user', content: userMsg });

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': ANTHROPIC_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: conversationHistory
    })
  });

  if (!resp.ok) {
    const err = await resp.json();
    throw new Error(err.error?.message || 'Error de API');
  }

  const data = await resp.json();
  const reply = data.content[0].text;
  conversationHistory.push({ role: 'assistant', content: reply });

  try {
    const json = JSON.parse(reply.trim());
    if (json.action === 'create_event') {
      const created = await createCalendarEvent(json.summary, json.start, json.end, json.description);
      if (created) {
        const startDate = new Date(json.start).toLocaleString('es-ES', {
          weekday:'long', day:'numeric', month:'long', hour:'2-digit', minute:'2-digit'
        });
        return `¡Hecho! He añadido "${json.summary}" a tu calendario para el ${startDate}. ✅`;
      } else {
        return 'Vaya, no he podido crear el evento. Comprueba que la Google Calendar API esté habilitada en tu proyecto.';
      }
    }
  } catch(e) {}

  return reply;
}

async function sendMessage(text) {
  const input = document.getElementById('msg-input');
  const msg = text || input.value.trim();
  if (!msg) return;
  if (!text) { input.value = ''; autoResize(input); }

  addMsg('user', msg);
  addTyping();

  try {
    const reply = await callCandela(msg);
    removeTyping();
    addMsg('candela', reply);
  } catch(e) {
    removeTyping();
    addMsg('candela', 'Ups, ha habido un problemilla. Revisa tu API Key de Anthropic.');
  }
}

function sendQuick(text) { sendMessage(text); }

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    addMsg('system', 'Tu navegador no soporta el micrófono. Prueba con Chrome.');
    return;
  }
  if (isRecording) { recognition.stop(); return; }

  recognition = new SR();
  recognition.lang = 'es-ES';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('btn-mic').classList.add('recording');
  };
  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript;
    document.getElementById('msg-input').value = t;
    autoResize(document.getElementById('msg-input'));
    sendMessage();
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('btn-mic').classList.remove('recording');
  };
  recognition.onerror = () => {
    isRecording = false;
    document.getElementById('btn-mic').classList.remove('recording');
  };
  recognition.start();
}
</script>
</body>
</html>
